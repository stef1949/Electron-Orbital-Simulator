<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Interactive, high-performance visualiser for hydrogen-like electron orbitals.">
  <link rel="canonical" href="https://stef1949.github.io/ElectronOrbitalVisualiser/">

  <meta property="og:title" content="Electron Orbital Simulator">
  <meta property="og:description" content="Interactive, high-performance visualiser for hydrogen-like electron orbitals with real spherical harmonics and multiple render modes.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://stef1949.github.io/ElectronOrbitalVisualiser/">
  <meta property="og:image" content="https://stef1949.github.io/ElectronOrbitalVisualiser/assets/orbital_screenshot.png">
  <meta property="og:image:alt" content="Screenshot of Electron Orbital Simulator">
  <meta property="og:locale" content="en_US">
  <meta property="og:site_name" content="Electron Orbital Simulator">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Electron Orbital Simulator">
  <meta name="twitter:description" content="Interactive, high-performance visualiser for hydrogen-like electron orbitals with real spherical harmonics and multiple render modes.">
  <meta name="twitter:image" content="https://stef1949.github.io/ElectronOrbitalVisualiser/assets/orbital_screenshot.png">

  <title>Electron Orbital Simulator</title>

  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(24, 24, 36, 0.58);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-dim: #a0aec0;
      --button-bg: #333333;
      --button-hover: #777777;
      --button-active: #3e7bff;
      --button-disabled: #555555;
      --shadow: 0 6px 12px rgba(0, 0, 0, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top, #202437 0%, #16161d 55%, #0e1014 100%);
      color: #f7f7f7;
    }

    #app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      gap: 0.5rem;
    }

    .app-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .app-subtitle {
      margin: 0 0 0.75rem;
      text-align: center;
      color: var(--text-dim);
      font-size: clamp(0.95rem, 1.8vw, 1.05rem);
    }

    #canvas-container {
      position: relative;
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #orbital-panel,
    #settings-panel,
    #fps-counter {
      background-color: var(--panel-bg);
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
    }

    #orbital-panel {
      position: absolute;
      top: 50%;
      right: 1rem;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 80vh;
      overflow: auto;
      padding: 0.5rem;
      border-radius: 0.75rem;
      z-index: 12;
    }

    #settings-panel {
      position: absolute;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      z-index: 10;
      max-width: calc(100vw - 2rem);
    }

    .orbital-button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.5rem;
      background-color: var(--button-bg);
      color: #ffffff;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
    }

    .orbital-button:hover {
      transform: translateY(-2px);
      background-color: var(--button-hover);
    }

    .orbital-button:active {
      transform: translateY(0);
    }

    .orbital-button.active {
      background-color: var(--button-active);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.16);
    }

    .orbital-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background-color: var(--button-disabled);
      transform: none;
      box-shadow: none;
    }

    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 13rem;
    }

    .slider-container label {
      font-size: 0.875rem;
    }

    .separator {
      width: 100%;
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin: 0.25rem 0;
    }

    #fps-counter {
      position: absolute;
      top: 1rem;
      left: 1rem;
      padding: 0.5rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-dim);
      z-index: 10;
    }

    #orientation-overlay {
      position: fixed;
      left: 12px;
      bottom: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      z-index: 20;
      pointer-events: none;
    }

    #orientation-canvas {
      width: 96px;
      height: 96px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.06);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
    }

    #orientation-buttons {
      display: flex;
      gap: 0.25rem;
      pointer-events: auto;
    }

    .orient-btn {
      padding: 0.2rem 0.5rem;
      border: none;
      border-radius: 6px;
      background: #333333;
      color: #ffffff;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .orient-btn:hover {
      background: #777777;
    }

    .orient-btn:active {
      transform: translateY(1px);
    }

    @media (max-width: 900px) {
      #orbital-panel {
        top: auto;
        bottom: 1rem;
        right: 1rem;
        transform: none;
        max-height: 42vh;
      }

      #settings-panel {
        bottom: 1rem;
        left: 1rem;
        right: 1rem;
        transform: none;
      }
    }

    @media (max-width: 640px) {
      #app-container {
        padding: 0.75rem;
      }

      #fps-counter {
        top: 0.75rem;
        left: 0.75rem;
      }

      #orbital-panel {
        left: 0.75rem;
        right: 0.75rem;
        width: auto;
      }

      .orbital-button {
        padding: 0.45rem 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div id="app-container">
    <h1 class="app-title">Electron Orbital Simulator</h1>
    <p class="app-subtitle">Click and drag to rotate, use the scroll wheel to zoom.</p>

    <div id="canvas-container">
      <canvas id="orbital-canvas" aria-label="Electron orbital visualization"></canvas>

      <div id="orbital-panel" aria-label="Orbital selection">
        <button class="orbital-button" data-orbital="1s" data-n="1" data-l="0" data-m="0" aria-label="1s orbital">1s</button>
        <button class="orbital-button" data-orbital="2s" data-n="2" data-l="0" data-m="0" aria-label="2s orbital">2s</button>
        <button class="orbital-button" data-orbital="3s" data-n="3" data-l="0" data-m="0" aria-label="3s orbital">3s</button>
        <hr class="separator">
        <button class="orbital-button" data-orbital="2p_x" data-n="2" data-l="1" data-m="1" aria-label="2p x orbital">2p<sub>x</sub></button>
        <button class="orbital-button" data-orbital="2p_y" data-n="2" data-l="1" data-m="-1" aria-label="2p y orbital">2p<sub>y</sub></button>
        <button class="orbital-button" data-orbital="2p_z" data-n="2" data-l="1" data-m="0" aria-label="2p z orbital">2p<sub>z</sub></button>
        <button class="orbital-button" data-orbital="3p_x" data-n="3" data-l="1" data-m="1" aria-label="3p x orbital">3p<sub>x</sub></button>
        <button class="orbital-button" data-orbital="3p_y" data-n="3" data-l="1" data-m="-1" aria-label="3p y orbital">3p<sub>y</sub></button>
        <button class="orbital-button" data-orbital="3p_z" data-n="3" data-l="1" data-m="0" aria-label="3p z orbital">3p<sub>z</sub></button>
        <hr class="separator">
        <button class="orbital-button" data-orbital="3d_z2" data-n="3" data-l="2" data-m="0" aria-label="3d z squared orbital">3d<sub>z²</sub></button>
        <button class="orbital-button" data-orbital="3d_x2-y2" data-n="3" data-l="2" data-m="2" aria-label="3d x squared minus y squared orbital">3d<sub>x²−y²</sub></button>
        <button class="orbital-button" data-orbital="3d_xy" data-n="3" data-l="2" data-m="-2" aria-label="3d xy orbital">3d<sub>xy</sub></button>
        <button class="orbital-button" data-orbital="3d_xz" data-n="3" data-l="2" data-m="1" aria-label="3d xz orbital">3d<sub>xz</sub></button>
        <button class="orbital-button" data-orbital="3d_yz" data-n="3" data-l="2" data-m="-1" aria-label="3d yz orbital">3d<sub>yz</sub></button>
        <hr class="separator">
        <button class="orbital-button" data-orbital="4s" data-n="4" data-l="0" data-m="0" aria-label="4s orbital">4s</button>
        <button class="orbital-button" data-orbital="4p_x" data-n="4" data-l="1" data-m="1" aria-label="4p x orbital">4p<sub>x</sub></button>
        <button class="orbital-button" data-orbital="4p_y" data-n="4" data-l="1" data-m="-1" aria-label="4p y orbital">4p<sub>y</sub></button>
        <button class="orbital-button" data-orbital="4p_z" data-n="4" data-l="1" data-m="0" aria-label="4p z orbital">4p<sub>z</sub></button>
        <button class="orbital-button" data-orbital="4d_z2" data-n="4" data-l="2" data-m="0" aria-label="4d z squared orbital">4d<sub>z²</sub></button>
        <button class="orbital-button" data-orbital="4d_x2-y2" data-n="4" data-l="2" data-m="2" aria-label="4d x squared minus y squared orbital">4d<sub>x²−y²</sub></button>
        <button class="orbital-button" data-orbital="4d_xy" data-n="4" data-l="2" data-m="-2" aria-label="4d xy orbital">4d<sub>xy</sub></button>
        <button class="orbital-button" data-orbital="4d_xz" data-n="4" data-l="2" data-m="1" aria-label="4d xz orbital">4d<sub>xz</sub></button>
        <button class="orbital-button" data-orbital="4d_yz" data-n="4" data-l="2" data-m="-1" aria-label="4d yz orbital">4d<sub>yz</sub></button>
      </div>

      <div id="settings-panel">
        <div class="slider-container">
          <label for="density-slider">Density: <span id="density-value">50000</span> points</label>
          <input type="range" id="density-slider" min="10000" max="150000" value="50000" step="10000">
        </div>
        <button id="adaptive-toggle" class="orbital-button">Adaptive Off</button>
        <button id="mode-toggle" class="orbital-button">Mode: Instanced</button>
        <button id="impostor-toggle" class="orbital-button">Impostor: Off</button>
        <button id="cull-toggle" class="orbital-button">Cull: Off</button>
        <button id="pause-toggle" class="orbital-button">Pause</button>
        <button id="clear-button" class="orbital-button">Clear</button>
        <button id="screenshot-button" class="orbital-button">Save PNG</button>
      </div>

      <div id="fps-counter">FPS: 0</div>

      <div id="orientation-overlay">
        <canvas id="orientation-canvas" width="140" height="140" aria-label="Orientation overlay"></canvas>
        <div id="orientation-buttons">
          <button id="snap-x" class="orient-btn" type="button">X</button>
          <button id="snap-y" class="orient-btn" type="button">Y</button>
          <button id="snap-z" class="orient-btn" type="button">Z</button>
          <button id="reset-orient" class="orient-btn" type="button">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
